<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" width="520" height="100">
  <!-- Background -->
  <rect width="520" height="100" fill="#0D0D0D"/>

  <!-- Hantel-Icon -->
  <g transform="translate(16, 14)">
    <!-- Linke Seite: außen (klein) → mitte → innen (groß) -->
    <rect x="0" y="22" width="7" height="28" fill="#F5FF40"/>
    <rect x="10" y="14" width="7" height="44" fill="#F5FF40"/>
    <rect x="20" y="6" width="8" height="60" fill="#F5FF40"/>
    <!-- Stange -->
    <rect x="28" y="30" width="32" height="12" fill="#F5FF40"/>
    <!-- Rechte Seite: innen (groß) → mitte → außen (klein) -->
    <rect x="60" y="6" width="8" height="60" fill="#F5FF40"/>
    <rect x="71" y="14" width="7" height="44" fill="#F5FF40"/>
    <rect x="81" y="22" width="7" height="28" fill="#F5FF40"/>
  </g>

  <!-- SUPERGYM -->
  <text x="116" y="68" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="60" letter-spacing="-2" fill="#F5FF40" text-anchor="start">SUPER</text>
  <text x="343" y="68" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="60" letter-spacing="-2" fill="#F7F7F7" text-anchor="start">GYM</text>
</svg>